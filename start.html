```html
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>핀세계 연결</title>

<style>

body{
    margin:0;
    background:#000;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
    padding:20px;
}

.box{
    width:100%;
    max-width:420px;
}

h1{
    color:#00ffcc;
    margin-bottom:15px;
}

p{
    color:#ddd;
    line-height:1.6;
    margin-bottom:30px;
}

.btn{
    display:block;
    width:100%;
    padding:18px;
    margin-bottom:15px;
    border:none;
    border-radius:12px;
    font-size:1.05em;
    font-weight:bold;
    cursor:pointer;
}

.android{
    background:#00ff88;
    color:black;
}

.iphone{
    background:#007aff;
    color:white;
}

.small{
    margin-top:20px;
    color:#999;
    font-size:0.9em;
}

</style>
</head>

<body>

<div class="box">

<h1>핀세계</h1>

<p>
사용 중인 기기에 맞는 방식으로 실행해 주세요.
</p>

<button class="btn android"
onclick="openAndroid()">
🤖 Android 앱 실행
</button>

<button class="btn iphone"
onclick="openIOS()">
🍎 iPhone 웹 실행
</button>

<div class="small">
iPhone은 Safari에서 실행 후<br>
"홈 화면에 추가"를 권장합니다.
</div>

</div>

<script>

function openAndroid() {

    location.href =
    "onestore://common/product/0001004603";

    setTimeout(function(){

        location.href =
        "https://m.onestore.co.kr/v2/ko-kr/app/0001004603";

    }, 1500);
}

function openIOS() {

    location.href =
    "https://finsegye.github.io/finsegyeAI/index.html";
}

</script>

</body>
</html>
```
