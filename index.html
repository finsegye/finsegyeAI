<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>핀세계</title>

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background:#0d0d0d;
    color:white;
    text-align:center;
}

.container {
    padding:20px;
}

h1 {
    color:#00ff88;
}

.btn {
    display:block;
    margin:30px auto;
    padding:15px;
    width:80%;
    max-width:300px;
    background:#00ff88;
    color:black;
    font-weight:bold;
    border-radius:10px;
    text-decoration:none;
}
</style>

<script>
// 🔥 3초 후 자동 이동 (여기에 원스토어 링크 넣기)
setTimeout(() => {
    location.href = "https://m.onestore.co.kr/mobilepoc/apps/appsDetail.omp?prodId=OA01004603";
}, 3000);


    // 🔥 QR 전용 원스토어 앱 실행 + 실패 시 웹 fallback
(function() {

    const appLink = "onestore://common/product/OA01004603"; // 🔥 핵심
    const webLink = "https://m.onestore.co.kr/mobilepoc/apps/appsDetail.omp?prodId=OA01004603";

    // 🤖 안드로이드 → 원스토어 앱 열기 시도
    if (/Android/i.test(navigator.userAgent)) {

        let moved = false;

        // 앱 실행
        location.href = appLink;

        // 앱으로 이동했는지 감지
        document.addEventListener("visibilitychange", function() {
            if (document.hidden) moved = true;
        });

        // 실패 시 웹으로 fallback
        setTimeout(function() {
            if (!moved) {
                location.href = webLink;
            }
        }, 1500);

    } else {
        // 🍎 iOS 등 → 바로 웹
        location.href = webLink;
    }

})();
    
</script>

</head>

<body>

<div class="container">

<h1>핀세계</h1>
<p>공유경제 금융 플랫폼</p>

<a href="https://m.onestore.co.kr/mobilepoc/apps/appsDetail.omp?prodId=OA01004603" class="btn">
👉 앱 설치하기
</a>

<p>잠시 후 자동으로 설치 화면으로 이동합니다</p>

</div>

</body>
</html>
